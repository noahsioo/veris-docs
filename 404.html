<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0A0F">
<link rel="preload" as="font" type="font/woff2" href="fonts/inter-latin.woff2" crossorigin>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<title>404 — Veris Docs</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="styles.css">
<style>
.error-page{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:calc(100vh - 56px);
padding:60px 24px;
text-align:center;
}
.error-code{
font-family:var(--mono);
font-size:clamp(80px,15vw,160px);
font-weight:500;
line-height:1;
background:linear-gradient(135deg,var(--cyan),var(--purple));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
margin-bottom:24px;
}
.error-title{
font-size:clamp(22px,4vw,32px);
font-weight:700;
color:#fff;
margin-bottom:12px;
}
.error-desc{
font-size:16px;
color:var(--muted);
max-width:420px;
margin-bottom:40px;
line-height:1.7;
}
.error-buttons{
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}
.error-btn{
display:inline-flex;
align-items:center;
font-family:var(--font);
font-size:14px;
font-weight:500;
color:#fff;
background:var(--surface);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:1px solid var(--border);
border-radius:10px;
padding:12px 24px;
text-decoration:none;
transition:border-color 0.3s,box-shadow 0.3s,transform 0.2s;
}
.error-btn:hover{
border-color:var(--border-hover);
box-shadow:0 0 30px rgba(0,240,255,0.06);
transform:translateY(-1px);
opacity:1;
}
.error-btn-primary{
background:linear-gradient(135deg,rgba(0,240,255,0.1),rgba(139,92,246,0.1));
border-color:rgba(0,240,255,0.2);
}
.error-terminal{
margin-top:48px;
font-family:var(--mono);
font-size:13px;
color:var(--dim);
}
.error-terminal span{color:var(--cyan)}

@media(max-width:480px){
.error-buttons{flex-direction:column;align-items:center}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 52 52" fill="none"><defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g filter="url(#glow)"><circle cx="26" cy="8" r="5" fill="#00F0FF" stroke="#00F0FF" stroke-width="1"/><circle cx="10" cy="40" r="5" fill="#00F0FF" stroke="#00F0FF" stroke-width="1"/><circle cx="42" cy="40" r="5" fill="#00F0FF" stroke="#00F0FF" stroke-width="1"/><line x1="26" y1="8" x2="10" y2="40" stroke="#00F0FF" stroke-width="1.5" opacity="0.5"/><line x1="26" y1="8" x2="42" y2="40" stroke="#00F0FF" stroke-width="1.5" opacity="0.5"/><line x1="10" y1="40" x2="42" y2="40" stroke="#00F0FF" stroke-width="1.5" opacity="0.5"/></g></svg>
    <span>Veris <span class="nav-docs">Docs</span></span>
  </a>
  <a href="https://github.com/noahsioo/veris" class="nav-github" target="_blank" rel="noopener" aria-label="GitHub">
    <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  </a>
</nav>

<main class="error-page">
<div class="error-code" data-animate>404</div>
<h1 class="error-title" data-animate style="--delay:0.1s">This memory doesn't exist.</h1>
<p class="error-desc" data-animate style="--delay:0.2s">The page you're looking for was never stored &mdash; or has been pruned.</p>
<div class="error-buttons" data-animate style="--delay:0.3s">
<a href="/" class="error-btn error-btn-primary">Documentation Home</a>
<a href="/getting-started/installation.html" class="error-btn">Getting Started</a>
<a href="https://veris.dev" class="error-btn">veris.dev</a>
</div>
<div class="error-terminal" data-animate style="--delay:0.4s">
<span>$</span> veris search "this page" &mdash; <em>0 results</em>
</div>
</main>

<div class="footer" style="max-width:840px;margin:0 auto;padding:32px 24px">
<span>Veris &mdash; Built by <a href="https://veris.dev/noah.html" target="_blank" rel="noopener">Noah Sioly</a></span>

</div>

<script src="docs.js"></script>
</body>
</html>
